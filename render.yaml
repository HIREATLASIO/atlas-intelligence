# Atlas Intelligence — Render Deployment Config
# Updated for Next.js static export

services:
  - type: web
    name: atlas-pro
    env: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
